title: GateMate Diagnostics
views:
  - title: Diagnostics
    path: diagnostics
    icon: mdi:flask
    type: masonry
    cards:
      - type: entities
        title: Transport control and authoritative layer
        show_header_toggle: false
        entities:
          - entity: input_select.lab_gate_transport_mode
            name: Transport mode
          - entity: sensor.lab_gate_distance_authoritative
            name: Authoritative distance (mm)
          - entity: sensor.lab_gate_battery_authoritative
            name: Authoritative battery

      - type: entities
        title: BLE transport
        show_header_toggle: false
        entities:
          - entity: sensor.lab_gate_distance_sensor_distance
            name: BLE distance (mm)
          - entity: sensor.lab_gate_distance_sensor_battery
            name: BLE battery
          - entity: binary_sensor.lab_gate_distance_sensor_vibration
            name: BLE vibration

      - type: entities
        title: LoRa transport
        show_header_toggle: false
        entities:
          - entity: sensor.lab_gate_lora_distance
            name: LoRa distance (mm)
          - entity: sensor.lab_gate_lora_battery
            name: LoRa battery

      - type: entities
        title: Logical layer (state + parameters)
        show_header_toggle: false
        entities:
          - entity: binary_sensor.lab_gate_vehicle_present
            name: Presence (read-only)
          - type: section
            label: Band and timing
          - entity: input_number.lab_gate_distance_min_m
            name: Min distance (m)
          - entity: input_number.lab_gate_distance_max_m
            name: Max distance (m)
          - entity: input_number.lab_gate_dwell_time_s
            name: Dwell time (s)
          - entity: input_number.lab_gate_clearance_time_s
            name: Clearance time (s)

      - type: markdown
        title: Alert status
        content: >-
          Alert acknowledged: **{% if is_state('input_boolean.lab_gate_alert_acknowledged','on') %}Yes{% else %}No{% endif %}**

          Last change: {{ states.input_boolean.lab_gate_alert_acknowledged.last_changed }}

      - type: history-graph
        title: Authoritative distance trend (last 2h)
        hours_to_show: 2
        refresh_interval: 30
        entities:
          - entity: sensor.lab_gate_distance_authoritative
            name: Authoritative distance (mm)

      - type: history-graph
        title: Presence trend (last 6h)
        hours_to_show: 6
        refresh_interval: 30
        entities:
          - entity: binary_sensor.lab_gate_vehicle_present
            name: Vehicle present