title: GateMate Lab
views:
  - title: GateMate
    path: gatemate
    icon: mdi:gate
    type: masonry
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            title: Vehicle Present?
            content: >-
              {% if is_state('binary_sensor.lab_gate_vehicle_present', 'on') %}
              # Yes
              {% else %}
              # No
              {% endif %}

          - type: tile
            entity: binary_sensor.lab_gate_vehicle_present
            name: Vehicle presence sensor
            state_content:
              - last_changed
            tap_action:
              action: more-info

          - type: markdown
            title: Alert status
            content: >-
              Alert acknowledged: **{% if is_state('input_boolean.lab_gate_alert_acknowledged','on') %}Yes{% else %}No{% endif %}**

              Last change: {{ states.input_boolean.lab_gate_alert_acknowledged.last_changed }}

          - type: history-graph
            title: Vehicle presence trend (last 6h)
            hours_to_show: 6
            refresh_interval: 30
            entities:
              - entity: binary_sensor.lab_gate_vehicle_present
                name: Vehicle present

      - type: entities
        title: Signal and inputs (read-only)
        show_header_toggle: false
        entities:
          - entity: sensor.lab_gate_distance_sensor_distance
            name: Distance (mm)
          - entity: sensor.lab_gate_distance_sensor_battery
            name: Battery
          - entity: binary_sensor.lab_gate_distance_sensor_vibration
            name: Vibration
          - type: section
            label: Detection parameters
          - entity: input_number.lab_gate_distance_min_m
            name: Min distance (m)
          - entity: input_number.lab_gate_distance_max_m
            name: Max distance (m)
          - entity: input_number.lab_gate_dwell_time_s
            name: Dwell time (s)
          - entity: input_number.lab_gate_clearance_time_s
            name: Clearance time (s)