- id: lab_gate_vehicle_detected_after_dwell
  alias: Lab Gate Vehicle Detected After Dwell
  description: Set vehicle present when distance remains within band for dwell time.
  triggers:
    - trigger: template
      value_template: >-
        {% set raw = states('sensor.lab_gate_distance_sensor_distance') %}
        {% set d_mm = raw | float(none) %}
        {% if d_mm is none or d_mm == 0 %}
          false
        {% else %}
          {% set d = d_mm / 1000 %}
          {% set min_m = states('input_number.lab_gate_distance_min_m') | float %}
          {% set max_m = states('input_number.lab_gate_distance_max_m') | float %}
          {{ d >= min_m and d <= max_m }}
        {% endif %}
      for:
        seconds: 5
  conditions:
    - condition: state
      entity_id: input_boolean.lab_gate_vehicle_present
      state: "off"
  actions:
    - action: script.lab_gate_set_vehicle_present
  mode: single

- id: lab_gate_vehicle_cleared_after_clearance
  alias: Lab Gate Vehicle Cleared After Clearance
  description: Clear vehicle present when distance remains outside band (or unavailable) for clearance time.
  triggers:
    - trigger: template
      value_template: >-
        {% set raw = states('sensor.lab_gate_distance_sensor_distance') %}
        {% set min_m = states('input_number.lab_gate_distance_min_m') | float %}
        {% set max_m = states('input_number.lab_gate_distance_max_m') | float %}

        {% if raw in ['unknown', 'unavailable'] %}
          true
        {% else %}
          {% set d_mm = raw | float(none) %}
          {% if d_mm is none or d_mm == 0 %}
            false
          {% else %}
            {% set d = d_mm / 1000 %}
            {{ d < min_m or d > max_m }}
          {% endif %}
        {% endif %}
      for:
        seconds: 3
  conditions:
    - condition: state
      entity_id: input_boolean.lab_gate_vehicle_present
      state: "on"
  actions:
    - action: script.lab_gate_set_vehicle_clear
  mode: single

- id: lab_gate_notify_presence_detected
  alias: "GateMate: notify on vehicle detected"
  description: "Send a mobile push notification when vehicle presence becomes true."
  mode: single
  trigger:
    - platform: state
      entity_id: input_boolean.lab_gate_vehicle_present
      from: "off"
      to: "on"
  condition: []
  action:
    - action: script.lab_gate_notify_detected

- id: lab_gate_notify_presence_cleared
  alias: "GateMate: notify on vehicle cleared"
  description: "Send a mobile push notification when vehicle presence becomes false."
  mode: single
  trigger:
    - platform: state
      entity_id: input_boolean.lab_gate_vehicle_present
      from: "on"
      to: "off"
  condition: []
  action:
    - action: script.lab_gate_notify_cleared

- id: lab_gate_notification_acknowledge
  alias: "GateMate: acknowledge alert"
  description: "Set alert acknowledgement helper when the mobile notification action is pressed."
  mode: single
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: "LAB_GATE_ACK"
  condition:
    - condition: state
      entity_id: input_boolean.lab_gate_alert_acknowledged
      state: "off"
  action:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.lab_gate_alert_acknowledged

- id: lab_gate_publish_vehicle_state_to_mqtt
  alias: Lab Gate Publish Vehicle State to MQTT
  description: Publish authoritative vehicle presence state to MQTT.
  mode: single
  trigger:
    - platform: state
      entity_id: input_boolean.lab_gate_vehicle_present
  action:
    - service: mqtt.publish
      data:
        topic: gatemate/lab/gate/vehicle_present
        payload: >
          {{ 'true' if is_state('input_boolean.lab_gate_vehicle_present', 'on') else 'false' }}
        retain: true

- id: lab_gate_notify_presence_still_present
  alias: "GateMate: notify if vehicle still present"
  description: "Send a follow-up notification if vehicle remains present for 2 minutes."
  mode: single
  trigger:
    - platform: state
      entity_id: input_boolean.lab_gate_vehicle_present
      to: "on"
      for:
        minutes: 2
  condition:
    - condition: state
      entity_id: input_boolean.lab_gate_alert_acknowledged
      state: "off"
  action:
    - action: script.lab_gate_notify_still_present

- id: lab_gate_low_battery_alert
  alias: "GateMate: Low battery alert (Lab Gate Distance Sensor)"
  description: "Notify when Shelly Blu Distance battery is low, with dedupe and re-arm."
  mode: single

  trigger:
    - platform: numeric_state
      entity_id: sensor.lab_gate_distance_sensor_battery
      below: 10

  condition:
    - condition: state
      entity_id: input_boolean.lab_gate_battery_alert_sent
      state: "off"

  action:
    - variables:
        device_name: "Lab Gate Distance Sensor"
        battery_entity: "sensor.lab_gate_distance_sensor_battery"
        battery_percent: "{{ states(battery_entity) | int(0) }}"

    - action: script.gatemate_notify_low_battery
      data:
        device_name: "{{ device_name }}"
        battery_entity: "{{ battery_entity }}"
        battery_percent: "{{ battery_percent }}"

    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.lab_gate_battery_alert_sent

    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.lab_gate_battery_last_alert
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

- id: lab_gate_low_battery_rearm
  alias: "GateMate: Low battery alert re-arm (Lab Gate Distance Sensor)"
  description: "Re-arm low battery notification once battery recovers above 25%."
  mode: single

  trigger:
    - platform: numeric_state
      entity_id: sensor.lab_gate_distance_sensor_battery
      above: 20

  condition:
    - condition: state
      entity_id: input_boolean.lab_gate_battery_alert_sent
      state: "on"

  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.lab_gate_battery_alert_sent

