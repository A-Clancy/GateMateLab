
# Loads default set of integrations.
default_config:

homeassistant:
  packages: !include_dir_named packages

# GateMate Lab modular includes
input_boolean: !include helpers/helpers_input_boolean.yaml
input_number: !include helpers/helpers_input_number.yaml
input_datetime: !include helpers/helpers_input_datetime.yaml
input_select: !include helpers/helpers_input_select.yaml
template: !include_dir_merge_list templates/

# Lovelace UI configuration updated to future proof dashboard
lovelace:
  dashboards:
    lovelace-yaml:
      mode: yaml
      filename: ui/ui-lovelace.yaml
      title: GateMate
      icon: mdi:gate
      show_in_sidebar: true
      require_admin: false
    
    gatemate-diagnostics:
      mode: yaml
      filename: ui/ui-diagnostics.yaml
      title: GateMate Diagnostics
      icon: mdi:flask
      show_in_sidebar: true
      require_admin: false

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include_dir_merge_list automations/
script: !include_dir_merge_named scripts/
scene: !include scenes.yaml
mqtt: !include mqtt.yaml