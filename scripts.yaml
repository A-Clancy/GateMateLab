lab_gate_set_vehicle_present:
  alias: "Lab Gate Set Vehicle Present"
  mode: single
  sequence:
    - service: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.lab_gate_alert_acknowledged
          - input_boolean.lab_gate_cleared_notified
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.lab_gate_vehicle_present
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.lab_gate_detected_notified


lab_gate_set_vehicle_clear:
  alias: "Lab Gate Set Vehicle Clear"
  mode: single
  sequence:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.lab_gate_vehicle_present
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.lab_gate_detected_notified
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.lab_gate_cleared_notified


lab_gate_notify_detected:
  alias: "GateMate: Notify Detected"
  mode: single
  sequence:
    - variables:
        throttle_seconds: 60
        last_ts: >
          {{ as_timestamp(states('input_datetime.lab_gate_last_notification')) }}
        now_ts: "{{ as_timestamp(now()) }}"
        can_send_time: >
          {{ last_ts is none or (now_ts - last_ts) > throttle_seconds }}
        already_sent: >
          {{ is_state('input_boolean.lab_gate_detected_notified', 'on') }}

    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.lab_gate_vehicle_present
              state: "on"
            - condition: template
              value_template: "{{ not already_sent }}"
            - condition: template
              value_template: "{{ can_send_time }}"
          sequence:
            - service: notify.mobile_app_lab_user_phone
              data:
                title: "GateMate"
                message: >-
                  Vehicle detected at gate.
                  Tap Acknowledge to confirm you have seen this.
                  Time: {{ now().strftime('%H:%M:%S') }}
                data:
                  actions:
                    - action: "LAB_GATE_ACK"
                      title: "Acknowledge"

            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.lab_gate_detected_notified

            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.lab_gate_last_notification
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      default: []

lab_gate_notify_cleared:
  alias: "GateMate: Notify Cleared"
  mode: single
  sequence:
    - variables:
        throttle_seconds: 30
        last_ts: >
          {{ as_timestamp(states('input_datetime.lab_gate_last_notification')) }}
        now_ts: "{{ as_timestamp(now()) }}"
        can_send_time: >
          {{ last_ts is none or (now_ts - last_ts) > throttle_seconds }}
        already_sent: >
          {{ is_state('input_boolean.lab_gate_cleared_notified', 'on') }}

    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.lab_gate_vehicle_present
              state: "off"
            - condition: template
              value_template: "{{ not already_sent }}"
            - condition: template
              value_template: "{{ can_send_time }}"
          sequence:
            - service: notify.mobile_app_lab_user_phone
              data:
                title: "GateMate"
                message: >-
                  Vehicle no longer detected at gate.
                  Acknowledged: {{ 'yes' if is_state('input_boolean.lab_gate_alert_acknowledged', 'on') else 'no' }}
                  Time: {{ now().strftime('%H:%M:%S') }}

            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.lab_gate_cleared_notified

            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.lab_gate_last_notification
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      default: []
